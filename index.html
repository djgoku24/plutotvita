<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FireStick Player Pro - Premium Sports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

    <style>
        :root {
            --primary: #e50914;
            --primary-dark: #b8070f;
            --accent: #00d4aa;
            --accent-dark: #00a085;
            --bg-main: #0a0e13;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: #b8c5d6;
            --text-muted: #6b7684;
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.25);
            --shadow-strong: 0 12px 40px rgba(0,0,0,0.4);
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
        body{
            background:radial-gradient(ellipse at top,#1a202c 0%,var(--bg-main) 50%,#000 100%);
            color:var(--text-primary);
            font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
            height:100vh;overflow:hidden;display:flex;position:relative;
        }
        body::before{
            content:'';position:fixed;inset:0;
            background:
                radial-gradient(circle at 20% 30%,rgba(229,9,20,0.05) 0%,transparent 50%),
                radial-gradient(circle at 80% 70%,rgba(0,212,170,0.04) 0%,transparent 50%);
            pointer-events:none;z-index:1;
        }
        #sidebar{
            width:400px;background:var(--glass);
            backdrop-filter:blur(20px) saturate(180%);
            -webkit-backdrop-filter:blur(20px) saturate(180%);
            border-right:1px solid var(--glass-border);
            display:flex;flex-direction:column;
            transition:transform .4s cubic-bezier(.4,0,.2,1),opacity .4s ease;
            z-index:100;position:relative;
        }
        body.fullscreen #sidebar{transform:translateX(-100%);opacity:0;pointer-events:none;}
        .sidebar-header{
            padding:32px 28px 24px;
            background:linear-gradient(135deg,rgba(229,9,20,0.08) 0%,transparent 100%);
            border-bottom:1px solid rgba(255,255,255,0.06);
        }
        .sidebar-header h1{
            font-size:24px;font-weight:800;letter-spacing:-.5px;
            background:linear-gradient(135deg,var(--text-primary) 0%,var(--primary) 100%);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            margin-bottom:6px;display:flex;align-items:center;gap:12px;
        }
        .logo-icon{
            width:10px;height:10px;
            background:linear-gradient(135deg,var(--primary),var(--accent));
            border-radius:50%;
            box-shadow:0 0 16px rgba(229,9,20,.6);
        }
        .sidebar-subtitle{
            font-size:12px;color:var(--text-muted);
            font-weight:500;letter-spacing:.5px;text-transform:uppercase;
        }
        .channel-list-container{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 20px 24px;}
        .channel-list-container::-webkit-scrollbar{width:4px;}
        .channel-list-container::-webkit-scrollbar-thumb{
            background:linear-gradient(180deg,var(--primary) 0%,var(--primary-dark) 100%);
            border-radius:10px;
        }
        .channel{
            padding:18px 20px;margin-bottom:10px;background:var(--glass);
            border-radius:14px;cursor:pointer;border:1px solid transparent;
            position:relative;overflow:hidden;
            transition:all .3s cubic-bezier(.4,0,.2,1);
        }
        .channel::before{
            content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
            background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.06) 50%,transparent 100%);
            transition:left .6s ease;
        }
        .channel:hover::before{left:100%;}
        .channel.focused{
            background:linear-gradient(135deg,rgba(229,9,20,.15) 0%,var(--glass) 100%);
            border-color:rgba(229,9,20,.4);
            transform:translateX(6px) scale(1.02);
            box-shadow:var(--shadow-strong),0 0 0 1px rgba(229,9,20,.2);
        }
        .channel.playing{
            border-left:4px solid var(--accent);
            background:linear-gradient(135deg,rgba(0,212,170,.12) 0%,var(--glass) 100%);
            box-shadow:var(--shadow-soft),0 0 20px rgba(0,212,170,.2);
        }
        .channel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
        .channel-name{
            font-size:16px;font-weight:600;color:var(--text-primary);
            letter-spacing:-.2px;display:flex;align-items:center;gap:10px;
        }
        .channel-icon{
            width:6px;height:6px;
            background:linear-gradient(135deg,var(--primary),var(--accent));
            border-radius:50%;
        }
        .channel-info{font-size:13px;color:var(--text-secondary);}
        .channel-epg-small{
            margin-top:6px;
            font-size:11px;
            color:var(--text-secondary);
        }
        .channel-epg-small .label{
            font-size:10px;text-transform:uppercase;font-weight:600;
            margin-right:4px;opacity:.8;
        }

        #player-container{
            flex:1;position:relative;background:#000;
            display:flex;align-items:center;justify-content:center;z-index:50;
        }
        body:not(.fullscreen) #player-container{
            padding:32px;background:radial-gradient(circle at center,#1a202c 0%,var(--bg-main) 100%);
        }
        body.fullscreen #player-container{
            position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:200;padding:0;
        }
        #video{
            width:100%;height:100%;background:#000;object-fit:contain;outline:none;
            transform:translateZ(.1px);transition:all .4s cubic-bezier(.4,0,.2,1);
        }
        body:not(.fullscreen) #video{
            border-radius:12px;box-shadow:0 24px 60px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.05);
            transform:scale(.98);
        }
        body.fullscreen #video{width:100vw!important;height:100vh!important;object-fit:fill;border-radius:0;transform:scale(1);}
        .ui-element{transition:opacity .4s ease,visibility .4s ease,transform .4s ease;opacity:1;visibility:visible;}
        body.ui-hidden .ui-element{opacity:0!important;visibility:hidden!important;}

        #live-indicator{
            position:absolute;top:24px;right:24px;
            background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);
            color:#fff;padding:8px 16px;border-radius:20px;font-size:11px;font-weight:700;
            letter-spacing:.5px;text-transform:uppercase;z-index:250;
            opacity:0;visibility:hidden;transition:all .3s ease;box-shadow:var(--shadow-soft);
        }
        body:not(.fullscreen) #live-indicator.active{opacity:1;visibility:visible;}
        #live-indicator::before{
            content:'●';color:#fff;margin-right:6px;font-size:8px;animation:live-dot 1.5s ease-in-out infinite;
        }
        @keyframes live-dot{0%,100%{opacity:1;}50%{opacity:.4;}}

        #channel-info{
            position:absolute;top:24px;left:24px;
            background:rgba(15,20,25,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:250;
            opacity:0;visibility:hidden;border:1px solid var(--glass-border);box-shadow:var(--shadow-soft);
        }
        body:not(.fullscreen) #channel-info.active{opacity:1;visibility:visible;}

        #controls{
            position:absolute;bottom:0;left:0;right:0;height:120px;
            background:linear-gradient(transparent 0%,rgba(0,0,0,.9) 100%);
            backdrop-filter:blur(12px);
            display:flex;flex-direction:column;justify-content:center;
            padding:0 32px 12px;font-size:14px;z-index:250;
            opacity:0;visibility:hidden;border-top:1px solid rgba(255,255,255,.05);
        }
        body.fullscreen #controls{opacity:1;visibility:visible;}
        .controls-top{display:flex;align-items:flex-start;justify-content:space-between;}
        .controls-info{flex:1;display:flex;flex-direction:column;gap:4px;}
        #current-channel{font-size:16px;font-weight:600;color:var(--text-primary);}
        #player-status{
            font-size:12px;color:var(--text-secondary);font-weight:500;
            display:flex;align-items:center;gap:8px;
        }
        #player-status::before{
            content:'●';color:var(--accent);font-size:8px;animation:status-pulse 2s ease-in-out infinite;
        }
        @keyframes status-pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
        .controls-hints{
            display:flex;
            gap:20px;
            font-size:12px;
            color:var(--text-secondary);
            font-weight:500;
            margin-left:24px;
        }
        .hint-key{
            background:linear-gradient(135deg,var(--primary) 0%,var(--accent) 100%);
            color:#fff;
            padding:2px 8px;
            border-radius:999px;
            font-weight:700;
            margin-right:4px;
            box-shadow:0 0 8px rgba(0,0,0,0.4);
        }

        #controls-epg{
            margin-top:8px;
            font-size:12px;
            color:var(--text-secondary);
            display:flex;
            flex-direction:column;
            gap:2px;
        }
        #controls-epg span.label{
            font-size:10px;text-transform:uppercase;font-weight:600;
            margin-right:4px;opacity:.8;
        }
        #epg-progress-wrapper{
            margin-top:2px;
            width:100%;
            height:4px;
            background:rgba(148,163,184,0.4);
            border-radius:999px;
            overflow:hidden;
        }
        #epg-progress-bar{
            height:100%;
            width:0%;
            background:linear-gradient(90deg,#22c55e,#a3e635);
            transition:width 0.4s ease;
        }

        @media(max-width:768px){
            #sidebar{width:100%;}
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <h1><div class="logo-icon"></div>Sky Tv & Sport Premium</h1>
            <div class="sidebar-subtitle">Live Streaming HD</div>
        </div>
        <div class="channel-list-container">
            <div id="channel-list"></div>
        </div>
    </div>

    <div id="player-container">
        <video id="video" preload="metadata" playsinline webkit-playsinline 
               x-webkit-airplay="deny" x5-video-player-type="hls"
               x5-video-player-fullscreen="true"></video>

        <!-- iframe per i canali speciali -->
        <iframe id="chanFrame" style="position:absolute;inset:0;width:100%;height:100%;border:0;display:none;"></iframe>

        <div id="live-indicator">LIVE</div>
        <div id="channel-info"><span id="current-channel-name">Nessun canale</span></div>
        
        <div id="controls" class="ui-element">
            <div class="controls-top">
                <div class="controls-info">
                    <span id="current-channel">Nessun canale selezionato</span>
                    <span id="player-status">In attesa</span>
                </div>
                <div class="controls-hints">
                    <span><span class="hint-key">↑</span>Canale +</span>
                    <span><span class="hint-key">↓</span>Canale -</span>
                    <span><span class="hint-key">OK</span>Info</span>
                    <span><span class="hint-key">⬅️</span>Lista</span>
                </div>
            </div>

            <div id="controls-epg">
                <div id="controls-epg-now">
                    <span class="label">ADESSO</span>
                    <span id="controls-epg-now-time"></span>
                    <span id="controls-epg-now-title"></span>
                </div>
                <div id="epg-progress-wrapper">
                    <div id="epg-progress-bar"></div>
                </div>
                <div id="controls-epg-next">
                    <span class="label">A SEGUIRE</span>
                    <span id="controls-epg-next-time"></span>
                    <span id="controls-epg-next-title"></span>
                </div>
            </div>
        </div>

   <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
  // ==== CONFIG EPG PLUTO (Matt Huisman) ====
  const EPG_PROXY     = 'https://morning-morning-68d9.antoninoaiello11.workers.dev/?url=';
const PLUTO_EPG_URL = 'https://i.mjh.nz/PlutoTV/it.xml.gz';

let epgByPlutoId = {};

function formatTimeEPG(d) {
  const h = d.getHours().toString().padStart(2,'0');
  const m = d.getMinutes().toString().padStart(2,'0');
  return h + ':' + m;
}

function parseXmltvDate(str) {
  const m = str.match(
    /^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})(?:\s*([+\-]\d{4}))?/
  );
  if (!m) return new Date(NaN);
  const [_, Y, MM, D, h, mnt, s, off] = m;
  const iso = `${Y}-${MM}-${D}T${h}:${mnt}:${s}${off ? off.replace(/(\d{2})(\d{2})/,'$1:$2') : 'Z'}`;
  return new Date(iso);
}

function getNowNext(list) {
  if (!list) return { current: null, next: null };
  const now = new Date();
  let current = null, next = null;

  for (let i = 0; i < list.length; i++) {
    const p = list[i];
    if (now >= p.start && now < p.stop) {
      current = p;
      next = list[i + 1] || null;
      break;
    }
    if (!current && !next && now < p.start) {
      next = p;
    }
  }
  return { current, next };
}

 async function loadPlutoEpg() {
  try {
    const res    = await fetch(EPG_PROXY + encodeURIComponent(PLUTO_EPG_URL));
    const buffer = await res.arrayBuffer();
    const xmlStr = pako.ungzip(buffer, { to: 'string' });

    epgByPlutoId = {};

    const parser = new DOMParser();
    const doc    = parser.parseFromString(xmlStr, 'application/xml');

    const progNodes = doc.getElementsByTagName('programme');

    for (let i = 0; i < progNodes.length; i++) {
      const node     = progNodes[i];
      const startStr = node.getAttribute('start');
      const stopStr  = node.getAttribute('stop');
      const chanId   = node.getAttribute('channel');
      if (!startStr || !stopStr || !chanId) continue;

      const titleNode = node.getElementsByTagName('title')[0];
      const title     = titleNode && titleNode.textContent
        ? titleNode.textContent
        : 'Senza titolo';

      const start = parseXmltvDate(startStr);
      const stop  = parseXmltvDate(stopStr);

      if (!epgByPlutoId[chanId]) epgByPlutoId[chanId] = [];
      epgByPlutoId[chanId].push({ start, stop, title });
    }

    Object.keys(epgByPlutoId).forEach(id => {
      epgByPlutoId[id].sort((a, b) => a.start - b.start);
    });
  } catch (e) {
    console.error('EPG Pluto error', e);
  }
}





 function updateEpgUIForPluto(channel) {
  if (!channel || !channel.plutoId) return;

  const list = epgByPlutoId[channel.plutoId];
  const { current, next } = getNowNext(list);

  if (current) {
    el.controlsEpgNowTime.textContent   = `${formatTimeEPG(current.start)} - ${formatTimeEPG(current.stop)}`;
    el.controlsEpgNowTitle.textContent  = current.title;

    if (el.epgProgressBar) {
      const now   = new Date();
      const total = current.stop - current.start;
      const done  = now - current.start;
      let perc = total > 0 ? (done / total) * 100 : 0;
      if (perc < 0) perc = 0;
      if (perc > 100) perc = 100;
      el.epgProgressBar.style.width = perc + '%';
    }
  } else {
    el.controlsEpgNowTime.textContent  = '';
    el.controlsEpgNowTitle.textContent = 'Nessun dato';
    if (el.epgProgressBar) el.epgProgressBar.style.width = '0%';
  }

  if (next) {
    el.controlsEpgNextTime.textContent  = `${formatTimeEPG(next.start)} - ${formatTimeEPG(next.stop)}`;
    el.controlsEpgNextTitle.textContent = next.title;
  } else {
    el.controlsEpgNextTime.textContent  = '';
    el.controlsEpgNextTitle.textContent = 'Nessun dato';
  }
}


 function refreshChannelsEpg() {
  document.querySelectorAll('#channel-list .channel').forEach((card, idx) => {
    const ch = channels[idx];
    if (!ch || !ch.plutoId) return;

    const list = epgByPlutoId[ch.plutoId];
    const { current, next } = getNowNext(list);

    const epgBox = card.querySelector('.channel-epg-small');
    if (!epgBox || epgBox.children.length < 2) return;

    const nowDiv  = epgBox.children[0];
    const nextDiv = epgBox.children[1];

    if (current) {
      nowDiv.innerHTML =
        `<span class="label">ADESSO</span>${formatTimeEPG(current.start)} - ${formatTimeEPG(current.stop)} · ${current.title}`;
    } else {
      nowDiv.innerHTML = '<span class="label">ADESSO</span>Nessun dato';
    }

    if (next) {
      nextDiv.innerHTML =
        `<span class="label">A SEGUIRE</span>${formatTimeEPG(next.start)} - ${formatTimeEPG(next.stop)} · ${next.title}`;
    } else {
      nextDiv.innerHTML = '<span class="label">A SEGUIRE</span>Nessun dato';
    }
  });

  if (appState.playingIndex >= 0) {
    const ch = channels[appState.playingIndex];
    updateEpgUIForPluto(ch);
  }
}


  // ==== ELEMENTI DOM ====
  const el = {
    body:document.body,
    video:document.getElementById('video'),
    frame:document.getElementById('chanFrame'),
    channelList:document.getElementById('channel-list'),
    currentChannel:document.getElementById('current-channel'),
    currentChannelName:document.getElementById('current-channel-name'),
    playerStatus:document.getElementById('player-status'),
    controls:document.getElementById('controls'),
    liveIndicator:document.getElementById('live-indicator'),
    channelInfo:document.getElementById('channel-info'),
    controlsEpgNowTime:document.getElementById('controls-epg-now-time'),
    controlsEpgNowTitle:document.getElementById('controls-epg-now-title'),
    controlsEpgNextTime:document.getElementById('controls-epg-next-time'),
    controlsEpgNextTitle:document.getElementById('controls-epg-next-title'),
    epgProgressBar:document.getElementById('epg-progress-bar'),
  };

  // ==== CANALI PLUTO DA API ====
 const PLUTO_IT_URL = 'https://plutotv.antoninoaiello11.workers.dev/it-channels';
let channels = [];

async function loadPlutoFromApi() {
  try {
    const res = await fetch(PLUTO_IT_URL);
    if (!res.ok) {
      throw new Error('HTTP ' + res.status);
    }

    const plutoChannels = await res.json();

    // Nessun filtro: prendi tutti i canali che Pluto ti restituisce
    const plutoAll = plutoChannels;

    console.log('Pluto channels raw len =', plutoChannels.length);
    console.log('Esempio primi 10 canali:', plutoChannels.slice(0, 10));

   channels = plutoAll.map(ch => {
  let cat = 'PLUTO';
  if (Array.isArray(ch.categories) && ch.categories.length) {
    cat = ch.categories[0];
  } else if (ch.category) {
    cat = ch.category;
  } else if (ch.group) {
    cat = ch.group;
  } else if (ch.subgenre) {
    cat = ch.subgenre;
  }

 return {
            name: ch.name,
            category: cat,
            type: 'pluto',
            url: `https://jmp2.uk/plu-${ch._id}.m3u8`,
            plutoId: ch._id
          };
        });

    console.log('channels finali =', channels.length);

    channels.sort((a, b) => {
      const c = a.category.localeCompare(b.category);
      return c !== 0 ? c : a.name.localeCompare(b.name);
    });

    buildChannels();
  } catch (err) {
    console.error('Errore nel caricamento canali Pluto', err);
    showStatus('Errore Pluto: ' + err.message, 'error');
  }
}


  let appState = {
    focusedIndex:0,
    playingIndex:-1,
    isFullscreen:false,
    hls:null,
    uiTimer:null,
    isPlaying:false,
    playingType:null
  };

  function resetUITimer(){
    el.body.classList.remove('ui-hidden');
    clearTimeout(appState.uiTimer);
    if(appState.isFullscreen){
      appState.uiTimer = setTimeout(()=>el.body.classList.add('ui-hidden'),4000);
    }
  }

  function showStatus(msg,type='info'){
    el.playerStatus.textContent = msg;
    const colors={info:'#b8c5d6',loading:'#fbbf24',success:'#00d4aa',error:'#f87171'};
    el.playerStatus.style.color = colors[type] || '#b8c5d6';
  }

  function buildChannels(){
    el.channelList.innerHTML = '';
    channels.forEach((channel, index)=>{
      const div = document.createElement('div');
      div.className='channel';
      div.dataset.index=index;
      div.innerHTML = `
        <div class="channel-header">
          <div class="channel-name">
            <div class="channel-icon"></div>
            ${channel.name}
          </div>
          <div class="live-badge">LIVE</div>
        </div>
        <div class="channel-info">
          ${channel.category ? channel.category : ''}
        </div>
        <div class="channel-epg-small">
          <div><span class="label">ADESSO</span>Nessun dato</div>
          <div><span class="label">A SEGUIRE</span>Nessun dato</div>
        </div>
      `;
      div.addEventListener('click',()=>handleChannelClick(index));
      el.channelList.appendChild(div);
    });
    updateFocus();
  }

  function updateFocus(){
    document.querySelectorAll('.channel').forEach((c,i)=>{
      c.classList.toggle('focused',i===appState.focusedIndex);
      c.classList.toggle('playing',i===appState.playingIndex);
    });
    const focusedEl = el.channelList.children[appState.focusedIndex];
    if(focusedEl) focusedEl.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

function handleChannelClick(index){
  const ch = channels[index];
  if (!ch) return;

  // Pluto in iframe
  if (ch.type === 'iframe' && ch.urlIframe){
    playIframeChannel(index);
    return;
  }

  // Eventuali altri canali HLS diretti
  if (ch.type === 'hls' && ch.url){
    playHlsChannel(index);
    return;
  }
}



  function destroyHls(){
    if(appState.hls){
      appState.hls.destroy();
      appState.hls=null;
    }
  }

  function playHlsChannel(index) {
  const channel = channels[index];
  if (!channel || !channel.url) return;

  // stesso canale HLS già in play: solo fullscreen
  if (
    index === appState.playingIndex &&
    appState.isPlaying &&
    appState.playingType === 'hls'
  ) {
    enterFullscreen();
    return;
  }

  appState.playingIndex = index;
  appState.focusedIndex = index;
  appState.playingType  = 'hls';

  el.currentChannel.textContent     = channel.name;
  el.currentChannelName.textContent = channel.name;

  // guida EPG nuova
  updateEpgUIForPluto(channel);

  // mostra video, nasconde iframe
  el.frame.style.display = 'none';
  el.frame.src           = '';
  el.video.style.display = 'block';

  destroyHls();
  el.video.pause();
  el.video.removeAttribute('src');
  el.video.load();
  appState.isPlaying = false;
  el.liveIndicator.classList.remove('active');
  el.channelInfo.classList.remove('active');
  showStatus('Connessione al canale...','loading');
  history.pushState({page:'player'},'Player','#player');

  if (window.Hls && Hls.isSupported()) {
    const hls = new Hls({
      enableWorker: false,
      lowLatencyMode: false,
      backBufferLength: 60,
      maxBufferLength: 30
    });
    appState.hls = hls;
    hls.loadSource(channel.url);
    hls.attachMedia(el.video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      el.video.muted  = false;
      el.video.volume = 1.0;
      el.video.play().then(() => {
        appState.isPlaying = true;
        enterFullscreen();
        showStatus('Stream attivo','success');
      }).catch((err) => {
        console.error('Play error', err);
        showStatus('Premi OK per avviare audio','info');
      });
    });
    hls.on(Hls.Events.ERROR, (event, data) => {
      console.error('HLS error', event, data);
      showStatus('Problema con lo stream','error');
    });
  } else {
    el.video.muted  = false;
    el.video.volume = 1.0;
    el.video.src    = channel.url;
    el.video.play().catch(() => showStatus('HLS non supportato','error'));
  }

  el.video.onplaying = () => {
    appState.isPlaying = true;
    el.liveIndicator.classList.add('active');
    el.channelInfo.classList.add('active');
  };
  el.video.onpause = () => {
    if (!el.video.ended) appState.isPlaying = false;
  };

  updateFocus();
}


 function playIframeChannel(index) {
  const channel = channels[index];
  if (!channel || !channel.urlIframe) return;

  // stesso canale iframe: solo fullscreen
  if (
    index === appState.playingIndex &&
    appState.playingType === 'iframe'
  ) {
    enterFullscreen();
    return;
  }

  appState.playingIndex = index;
  appState.focusedIndex = index;
  appState.playingType  = 'iframe';

  el.currentChannel.textContent     = channel.name;
  el.currentChannelName.textContent = channel.name;

  // guida EPG nuova
  updateEpgUIForPluto(channel);

  // stop HLS
  destroyHls();
  el.video.pause();
  el.video.removeAttribute('src');
  el.video.load();
  appState.isPlaying = true; // lo consideriamo in riproduzione

  // mostra iframe, nasconde video
  el.video.style.display = 'none';
  el.frame.style.display = 'block';
  el.frame.src           = channel.urlIframe;

  el.liveIndicator.classList.add('active');
  el.channelInfo.classList.add('active');
  showStatus('Iframe attivo','success');
  history.pushState({page:'player'},'Player','#player');

  enterFullscreen();
  updateFocus();
}


  function enterFullscreen(){
    appState.isFullscreen=true;
    el.body.classList.add('fullscreen');
    el.liveIndicator.classList.remove('active');
    el.channelInfo.classList.remove('active');
    resetUITimer();
    if(appState.playingIndex>=0) {
      updateEpgUIForPluto(channels[appState.playingIndex]);
    }
  }

  function exitFullscreen(){
    appState.isFullscreen=false;
    el.body.classList.remove('fullscreen');
    el.body.classList.remove('ui-hidden');
    clearTimeout(appState.uiTimer);
    if(appState.isPlaying){
      el.liveIndicator.classList.add('active');
      el.channelInfo.classList.add('active');
    }
    if(appState.playingIndex>=0){
      appState.focusedIndex=appState.playingIndex;
      updateFocus();
    }
  }

  window.addEventListener('popstate',()=>{if(appState.isFullscreen) exitFullscreen();});

  document.addEventListener('keydown', (e) => {
    e.stopPropagation();
    const code = e.keyCode || e.which;
    const key  = e.key || '';

    const isUp    = key === 'ArrowUp'    || code === 38;
    const isDown  = key === 'ArrowDown'  || code === 40;
    const isLeft  = key === 'ArrowLeft'  || code === 37;
    const isRight = key === 'ArrowRight' || code === 39;
    const isEnter = key === 'Enter'      || code === 13;
    const isSpace = key === ' '          || code === 32;
    const isBack  = key === 'Backspace'  || key === 'Escape' || [8,27,461,10009].includes(code);

    resetUITimer();

    if (isBack) {
      e.preventDefault();
      if (appState.isFullscreen) {
        exitFullscreen();
      }
      return;
    }

    // NON FULLSCREEN: navigo la lista
    if (!appState.isFullscreen) {
      if (isUp) {
        e.preventDefault();
        if (appState.focusedIndex > 0) {
          appState.focusedIndex--;
          updateFocus();
        }
        return;
      }
      if (isDown) {
        e.preventDefault();
        if (appState.focusedIndex < channels.length - 1) {
          appState.focusedIndex++;
          updateFocus();
        }
        return;
      }
      if (isEnter) {
        e.preventDefault();
        handleChannelClick(appState.focusedIndex);
        return;
      }
      return;
    }

    // FULLSCREEN
if (isEnter) {
  // NON faccio preventDefault → lascio passare l'evento all'iframe
  // così puoi usare OK per interagire con il player interno (play/pause)
  el.body.classList.remove('ui-hidden');
  resetUITimer();
  return;
}

// tasto destra: mostra barra info / overlay
if (isRight) {
  e.preventDefault();
  el.body.classList.remove('ui-hidden');
  resetUITimer();
  return;
}


    // comandi playback solo per HLS
    if (isSpace && appState.playingType === 'hls') {
      e.preventDefault();
      if (el.video.paused) {
        el.video.play();
        showStatus('▶ Play','success');
      } else {
        el.video.pause();
        showStatus('⏸ Pausa','info');
      }
      return;
    }

    // sinistra: torna alla lista
    if (isLeft) {
      e.preventDefault();
      exitFullscreen();
      appState.focusedIndex = appState.playingIndex;
      updateFocus();
      el.body.classList.remove('ui-hidden');
      return;
    }

    // su/giù in fullscreen: zapping
    if (isUp) {
      e.preventDefault();
      let i = appState.playingIndex + 1;
      while (
        i < channels.length &&
        !(
          (channels[i].type === 'hls' && channels[i].url) ||
          (channels[i].type === 'iframe' && channels[i].urlIframe)
        )
      ) {
        i++;
      }
      if (i < channels.length) {
        if (channels[i].type === 'iframe') {
          playIframeChannel(i);
        } else {
          playHlsChannel(i);
        }
      }
      return;
    }

    if (isDown) {
      e.preventDefault();
      let i = appState.playingIndex - 1;
      while (
        i >= 0 &&
        !(
          (channels[i].type === 'hls' && channels[i].url) ||
          (channels[i].type === 'iframe' && channels[i].urlIframe)
        )
      ) {
        i--;
      }
      if (i >= 0) {
        if (channels[i].type === 'iframe') {
          playIframeChannel(i);
        } else {
          playHlsChannel(i);
        }
      }
      return;
    }
  });

  async function init(){
  showStatus('Caricamento canali Pluto...','loading');

  await loadPlutoFromApi();   // canali + buildChannels()
  await loadPlutoEpg();       // guida Pluto
  refreshChannelsEpg();       // EPG nelle card

  document.addEventListener('visibilitychange',()=>{
    if(
      !document.hidden &&
      appState.playingIndex>=0 &&
      appState.playingType==='hls' &&
      !el.video.paused
    ){
      el.video.play().catch(()=>{});
    }
  });

  showStatus('Pronto per lo streaming','success');
}
init();

</script>
